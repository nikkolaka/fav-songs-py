<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FavSongs</title>
    <link rel="stylesheet" href="/styles.css?v=20260301a" />
  </head>
  <body>
    <main>
      <header class="panel masthead">
        <div class="masthead-copy">
          <h1>FavSongs</h1>
        </div>
        <div class="button-row">
          <button id="connect" type="button">Connect Spotify</button>
          <button id="toggle" type="button">Start Tracker</button>
        </div>
      </header>

      <p id="message" class="panel message" role="status" aria-live="polite"></p>

      <section class="panel status-panel">
        <h2>Status</h2>
        <dl class="status-grid">
          <div class="status-card">
            <dt>Status</dt>
            <dd id="status">Not connected</dd>
          </div>
          <div class="status-card">
            <dt>Account</dt>
            <dd id="account">-</dd>
          </div>
          <div class="status-card">
            <dt>Tracker</dt>
            <dd id="tracker">Stopped</dd>
          </div>
          <div class="status-card">
            <dt>Tracks (24h)</dt>
            <dd id="plays">0</dd>
          </div>
          <div class="status-card status-card-track">
            <dt>Closest to favorite</dt>
            <dd class="status-track">
              <span id="next-title" class="status-primary">-</span>
              <span id="next-artist" class="status-secondary">No track below threshold</span>
            </dd>
          </div>
        </dl>
      </section>

      <details class="panel collapsible" data-focus-panel>
        <summary>Now Playing</summary>
        <div class="panel-content stack">
          <p id="track-title"><strong>No active track</strong></p>
          <p id="track-artist">Connect Spotify to begin.</p>
          <progress id="bar" max="100" value="0"></progress>
          <p id="clock">00:00 / 00:00</p>
        </div>
      </details>

      <details class="panel collapsible" data-focus-panel>
        <summary>Recent Plays</summary>
        <div class="panel-content stack">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Track</th>
                  <th>Plays</th>
                  <th>When</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="recent-body">
                <tr>
                  <td colspan="4">No plays yet.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </details>

      <details class="panel collapsible" data-focus-panel>
        <summary>Settings</summary>
        <div class="panel-content stack">
          <form id="settings-form">
            <label>
              Favorite threshold
              <input id="favorite-threshold" type="number" min="1" max="100" />
            </label>
            <label>
              Completion ratio
              <input id="completion-ratio" type="number" min="0.5" max="1" step="0.05" />
            </label>
            <label>
              Check interval (seconds)
              <input id="check-interval" type="number" min="3" max="300" />
            </label>
            <label class="field-wide">
              Playlist name
              <input id="playlist-name" type="text" maxlength="200" />
            </label>
            <label>
              Playlist privacy
              <select id="playlist-public">
                <option value="public">Public</option>
                <option value="private">Private</option>
              </select>
            </label>
            <label class="checkbox-row">
              <input id="auto-add" type="checkbox" />
              Auto add when threshold is reached
            </label>
            <div class="form-actions">
              <button type="submit">Save Settings</button>
            </div>
          </form>
        </div>
      </details>

      <details class="panel collapsible" data-focus-panel>
        <summary>Favorites</summary>
        <div class="panel-content stack">
          <div class="button-row">
            <button id="remove-selected" type="button" disabled>Remove Selected from Playlist</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="selection-cell">Select</th>
                  <th>
                    <button type="button" class="sort-button" data-favorites-sort="name">
                      Track
                    </button>
                  </th>
                  <th>
                    <button type="button" class="sort-button" data-favorites-sort="artist">
                      Artist
                    </button>
                  </th>
                  <th>
                    <button type="button" class="sort-button" data-favorites-sort="occurrences">
                      Plays
                    </button>
                  </th>
                  <th>
                    <button type="button" class="sort-button" data-favorites-sort="last_played">
                      Last played
                    </button>
                  </th>
                </tr>
              </thead>
              <tbody id="favorites-body">
                <tr>
                  <td colspan="5">No favorites yet.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </details>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const ui = {
        connect: $('connect'),
        toggle: $('toggle'),
        message: $('message'),
        status: $('status'),
        account: $('account'),
        tracker: $('tracker'),
        plays: $('plays'),
        nextTitle: $('next-title'),
        nextArtist: $('next-artist'),
        title: $('track-title'),
        artist: $('track-artist'),
        bar: $('bar'),
        clock: $('clock'),
        recentBody: $('recent-body'),
        favoritesBody: $('favorites-body'),
        removeSelected: $('remove-selected'),
        form: $('settings-form'),
        favoriteThreshold: $('favorite-threshold'),
        completionRatio: $('completion-ratio'),
        checkInterval: $('check-interval'),
        playlistName: $('playlist-name'),
        playlistPublic: $('playlist-public'),
        autoAdd: $('auto-add'),
        favoriteSortButtons: Array.from(document.querySelectorAll('[data-favorites-sort]')),
        focusPanels: Array.from(document.querySelectorAll('[data-focus-panel]')),
      };

      let state = null;
      let favoriteRows = [];
      let livePlayback = null;
      let loadInFlight = false;
      let settingsDirty = false;
      let selectedFavoriteIds = new Set();
      let lastSelectedFavoriteId = null;
      let removeConfirmArmed = false;
      let removeConfirmTimer = null;

      const favoriteSort = {
        key: 'occurrences',
        direction: 'desc',
      };

      async function api(path, options = {}) {
        const request = { ...options, headers: { ...(options.headers || {}) } };
        if (request.body && !request.headers['Content-Type']) {
          request.headers['Content-Type'] = 'application/json';
        }
        const response = await fetch(path, request);
        const type = response.headers.get('content-type') || '';
        const payload = type.includes('application/json')
          ? await response.json()
          : await response.text();
        if (!response.ok) {
          throw new Error(payload && payload.detail ? payload.detail : String(payload || 'Request failed'));
        }
        return payload;
      }

      function msg(text, isError = false) {
        ui.message.textContent = text || '';
        if (!text) {
          delete ui.message.dataset.tone;
          return;
        }
        ui.message.dataset.tone = isError ? 'error' : 'info';
      }

      function clock(ms) {
        const seconds = Math.max(0, Math.floor((Number(ms) || 0) / 1000));
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
      }

      function ago(ms) {
        if (!ms) return '-';
        const diffMinutes = Math.max(0, Math.floor((Date.now() - Number(ms)) / 60000));
        if (diffMinutes < 60) return diffMinutes + 'm ago';
        if (diffMinutes < 1440) return Math.floor(diffMinutes / 60) + 'h ago';
        return Math.floor(diffMinutes / 1440) + 'd ago';
      }

      function esc(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function setIdlePlayback(detail) {
        livePlayback = null;
        ui.title.innerHTML = '<strong>No active track</strong>';
        ui.artist.textContent = detail;
        ui.bar.value = 0;
        ui.clock.textContent = '00:00 / 00:00';
      }

      function renderPlaybackFrame() {
        if (!livePlayback) {
          return;
        }

        const elapsed = livePlayback.isPlaying
          ? Math.max(0, Date.now() - livePlayback.clientStartedAt)
          : 0;
        const progressMs = Math.min(
          livePlayback.durationMs,
          livePlayback.baseProgressMs + elapsed
        );
        const percent = livePlayback.durationMs > 0
          ? Math.max(0, Math.min(100, (progressMs / livePlayback.durationMs) * 100))
          : 0;

        ui.title.innerHTML = '<strong>' + esc(livePlayback.name) + '</strong>';
        ui.artist.textContent = livePlayback.artist;
        ui.bar.value = percent;
        ui.clock.textContent = clock(progressMs) + ' / ' + clock(livePlayback.durationMs);
      }

      function syncSettingsForm(settings) {
        if (settingsDirty) {
          return;
        }
        ui.favoriteThreshold.value = settings.favorite_threshold;
        ui.completionRatio.value = settings.min_completion_ratio;
        ui.checkInterval.value = settings.check_interval;
        ui.playlistName.value = settings.playlist_name;
        ui.playlistPublic.value = settings.playlist_public ? 'public' : 'private';
        ui.autoAdd.checked = Boolean(settings.auto_add_enabled);
      }

      function renderRecentPlays(data) {
        if (!data.recent_plays.length) {
          ui.recentBody.innerHTML = '<tr><td colspan="4">No plays yet.</td></tr>';
          return;
        }

        ui.recentBody.innerHTML = data.recent_plays.map((item) => {
          const action = item.in_playlist
            ? 'In playlist'
            : '<button type="button" data-track-id="' + esc(item.track_id) + '"' +
              (state && state.connected ? '' : ' disabled') +
              '>Add</button>';
          return (
            '<tr>' +
            '<td>' + esc(item.artist + ' - ' + item.name) + '</td>' +
            '<td>' + item.plays + '</td>' +
            '<td>' + ago(item.played_at) + '</td>' +
            '<td>' + action + '</td>' +
            '</tr>'
          );
        }).join('');
      }

      function normalizeFavorite(item) {
        return {
          track_id: String(item.track_id || ''),
          name: String(item.name || 'Unknown Track'),
          artist: String(item.artist || 'Unknown Artist'),
          occurrences: Number(item.occurrences) || 0,
          last_played: Number(item.last_played) || 0,
          in_playlist: Boolean(item.in_playlist),
        };
      }

      function favoriteValue(item, key) {
        if (key === 'name' || key === 'artist') {
          return item[key].toLowerCase();
        }
        return Number(item[key]) || 0;
      }

      function clearRemoveConfirmation() {
        removeConfirmArmed = false;
        if (removeConfirmTimer) {
          window.clearTimeout(removeConfirmTimer);
          removeConfirmTimer = null;
        }
      }

      function armRemoveConfirmation() {
        clearRemoveConfirmation();
        removeConfirmArmed = true;
        removeConfirmTimer = window.setTimeout(() => {
          clearRemoveConfirmation();
          updateRemoveSelectedButton();
        }, 4000);
      }

      function updateRemoveSelectedButton() {
        const count = selectedFavoriteIds.size;
        ui.removeSelected.disabled = !state || !state.connected || count === 0;
        if (count === 0) {
          ui.removeSelected.textContent = 'Remove Selected from Playlist';
          return;
        }

        ui.removeSelected.textContent = removeConfirmArmed
          ? 'Click Again to Confirm (' + count + ')'
          : 'Remove Selected from Playlist (' + count + ')';
      }

      function selectedFavoriteOrder() {
        return Array.from(ui.favoritesBody.querySelectorAll('[data-remove-track-id]'))
          .map((input) => input.dataset.removeTrackId)
          .filter(Boolean);
      }

      function setFavoriteSelection(trackId, checked) {
        if (!trackId) {
          return;
        }
        if (checked) {
          selectedFavoriteIds.add(trackId);
        } else {
          selectedFavoriteIds.delete(trackId);
        }
      }

      function applyFavoriteSelectionRange(startId, endId, checked) {
        const orderedIds = selectedFavoriteOrder();
        const startIndex = orderedIds.indexOf(startId);
        const endIndex = orderedIds.indexOf(endId);
        if (startIndex === -1 || endIndex === -1) {
          setFavoriteSelection(endId, checked);
          return;
        }

        const from = Math.min(startIndex, endIndex);
        const to = Math.max(startIndex, endIndex);
        for (const trackId of orderedIds.slice(from, to + 1)) {
          setFavoriteSelection(trackId, checked);
        }
      }

      function compareFavorites(a, b) {
        const direction = favoriteSort.direction === 'asc' ? 1 : -1;
        const left = favoriteValue(a, favoriteSort.key);
        const right = favoriteValue(b, favoriteSort.key);

        if (left < right) return -1 * direction;
        if (left > right) return 1 * direction;
        if (a.in_playlist !== b.in_playlist) return a.in_playlist ? -1 : 1;
        if (a.occurrences !== b.occurrences) return b.occurrences - a.occurrences;
        if (a.last_played !== b.last_played) return b.last_played - a.last_played;

        const artistCompare = a.artist.localeCompare(b.artist);
        if (artistCompare) return artistCompare;
        return a.name.localeCompare(b.name);
      }

      function refreshFavoriteSortButtons() {
        ui.favoriteSortButtons.forEach((button) => {
          const isActive = button.dataset.favoritesSort === favoriteSort.key;
          button.classList.toggle('active', isActive);
          button.dataset.arrow = isActive
            ? (favoriteSort.direction === 'asc' ? '^' : 'v')
            : '<>';
          button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
      }

      function renderFavorites(items) {
        favoriteRows = items.map(normalizeFavorite);
        const removableIds = new Set(
          favoriteRows
            .filter((item) => item.in_playlist)
            .map((item) => item.track_id)
        );
        selectedFavoriteIds = new Set(
          Array.from(selectedFavoriteIds).filter((trackId) => removableIds.has(trackId))
        );
        if (lastSelectedFavoriteId && !removableIds.has(lastSelectedFavoriteId)) {
          lastSelectedFavoriteId = null;
        }
        refreshFavoriteSortButtons();
        updateRemoveSelectedButton();

        if (!favoriteRows.length) {
          ui.favoritesBody.innerHTML = '<tr><td colspan="5">No favorites yet.</td></tr>';
          return;
        }

        const sortedRows = [...favoriteRows].sort(compareFavorites);
        ui.favoritesBody.innerHTML = sortedRows.map((item) => {
          const checkbox = item.in_playlist
            ? '<td class="selection-cell"><input type="checkbox" data-remove-track-id="' +
              esc(item.track_id) + '"' +
              (selectedFavoriteIds.has(item.track_id) ? ' checked' : '') +
              ' aria-label="Select ' + esc(item.name) + '" /></td>'
            : '<td class="selection-cell"></td>';
          return (
            '<tr>' +
            checkbox +
            '<td><div class="track-cell"><span>' + esc(item.name) + '</span></div></td>' +
            '<td>' + esc(item.artist) + '</td>' +
            '<td>' + item.occurrences + '</td>' +
            '<td>' + ago(item.last_played) + '</td>' +
            '</tr>'
          );
        }).join('');
      }

      function render(data) {
        state = data;
        ui.connect.textContent = data.connected ? 'Logout' : 'Connect Spotify';
        ui.status.textContent = data.connected ? 'Connected' : 'Not connected';
        ui.account.textContent = data.account ? data.account.display_name : '-';
        ui.tracker.textContent = data.tracker_running ? 'Started' : 'Stopped';
        ui.toggle.textContent = data.tracker_running ? 'Stop Tracker' : 'Start Tracker';
        ui.toggle.disabled = !data.connected;
        ui.plays.textContent = String(data.stats.tracks_counted_24h);
        if (data.stats.next_favorite) {
          ui.nextTitle.textContent = data.stats.next_favorite.name;
          ui.nextArtist.textContent = data.stats.next_favorite.artist;
        } else {
          ui.nextTitle.textContent = '-';
          ui.nextArtist.textContent = 'No track below threshold';
        }

        const now = data.now_playing;
        if (now && !now.error && now.name) {
          livePlayback = {
            name: now.name,
            artist: now.artist,
            durationMs: Number(now.duration_ms) || 0,
            baseProgressMs: Number(now.progress_ms) || 0,
            isPlaying: Boolean(now.is_playing),
            clientStartedAt: Date.now(),
          };
          renderPlaybackFrame();
        } else {
          setIdlePlayback(now && now.error ? now.error : 'Spotify playback is idle.');
        }

        syncSettingsForm(data.settings);
        renderRecentPlays(data);
        renderFavorites(data.favorites);
      }

      async function load() {
        if (loadInFlight) {
          return;
        }
        loadInFlight = true;
        try {
          render(await api('/api/state'));
        } finally {
          loadInFlight = false;
        }
      }

      ui.connect.addEventListener('click', async () => {
        try {
          msg('');
          if (state && state.connected) {
            clearRemoveConfirmation();
            selectedFavoriteIds.clear();
            lastSelectedFavoriteId = null;
            await api('/api/auth/logout', { method: 'POST' });
            msg('Logged out.');
            await load();
            return;
          }

          const data = await api('/api/auth/start', { method: 'POST' });
          window.location.href = data.auth_url;
        } catch (error) {
          msg(error.message, true);
        }
      });

      ui.toggle.addEventListener('click', async () => {
        if (!state || !state.connected) return;
        const path = state.tracker_running ? '/api/tracker/stop' : '/api/tracker/start';
        try {
          msg('');
          await api(path, { method: 'POST' });
          await load();
        } catch (error) {
          msg(error.message, true);
        }
      });

      ui.form.addEventListener('input', () => {
        settingsDirty = true;
      });

      ui.form.addEventListener('change', () => {
        settingsDirty = true;
      });

      ui.form.addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          msg('');
          await api('/api/settings', {
            method: 'POST',
            body: JSON.stringify({
              favorite_threshold: Number(ui.favoriteThreshold.value),
              min_completion_ratio: Number(ui.completionRatio.value),
              check_interval: Number(ui.checkInterval.value),
              playlist_name: ui.playlistName.value.trim(),
              playlist_public: ui.playlistPublic.value === 'public',
              auto_add_enabled: ui.autoAdd.checked,
            }),
          });
          settingsDirty = false;
          msg('Settings saved.');
          await load();
        } catch (error) {
          msg(error.message, true);
        }
      });

      ui.recentBody.addEventListener('click', async (event) => {
        const button = event.target.closest('[data-track-id]');
        if (!button) {
          return;
        }
        try {
          msg('');
          await api('/api/favorites/' + encodeURIComponent(button.dataset.trackId) + '/add', {
            method: 'POST',
          });
          msg('Track added to playlist.');
          await load();
        } catch (error) {
          msg(error.message, true);
        }
      });

      ui.favoritesBody.addEventListener('click', (event) => {
        const input = event.target.closest('[data-remove-track-id]');
        if (!input) {
          return;
        }

        const trackId = input.dataset.removeTrackId;
        if (!trackId) {
          return;
        }

        if (event.shiftKey && lastSelectedFavoriteId && lastSelectedFavoriteId !== trackId) {
          applyFavoriteSelectionRange(lastSelectedFavoriteId, trackId, input.checked);
        } else {
          setFavoriteSelection(trackId, input.checked);
        }

        lastSelectedFavoriteId = trackId;
        clearRemoveConfirmation();
        renderFavorites(favoriteRows);
      });

      ui.removeSelected.addEventListener('click', async () => {
        const trackIds = Array.from(selectedFavoriteIds);
        if (!trackIds.length) {
          return;
        }

        if (!removeConfirmArmed) {
          armRemoveConfirmation();
          updateRemoveSelectedButton();
          msg('Click the remove button again within 4 seconds to confirm.');
          return;
        }

        try {
          clearRemoveConfirmation();
          updateRemoveSelectedButton();
          msg('');
          const result = await api('/api/favorites/remove', {
            method: 'POST',
            body: JSON.stringify({ track_ids: trackIds }),
          });
          selectedFavoriteIds.clear();
          lastSelectedFavoriteId = null;
          msg(
            'Removed ' + result.removed + ' track' +
            (result.removed === 1 ? '' : 's') +
            ' from the playlist.'
          );
          await load();
        } catch (error) {
          clearRemoveConfirmation();
          updateRemoveSelectedButton();
          msg(error.message, true);
        }
      });

      ui.favoriteSortButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const nextKey = button.dataset.favoritesSort;
          if (!nextKey) {
            return;
          }

          if (favoriteSort.key === nextKey) {
            favoriteSort.direction = favoriteSort.direction === 'asc' ? 'desc' : 'asc';
          } else {
            favoriteSort.key = nextKey;
            favoriteSort.direction = (nextKey === 'name' || nextKey === 'artist') ? 'asc' : 'desc';
          }

          renderFavorites(favoriteRows);
        });
      });

      ui.focusPanels.forEach((panel) => {
        panel.addEventListener('toggle', () => {
          if (!panel.open) {
            return;
          }
          ui.focusPanels.forEach((other) => {
            if (other !== panel) {
              other.open = false;
            }
          });
        });
      });

      const oauth = new URLSearchParams(window.location.search).get('oauth');
      if (oauth === 'connected') msg('Spotify connected.');
      if (oauth === 'error') msg('Spotify sign-in failed.', true);
      if (oauth) history.replaceState({}, '', '/');

      refreshFavoriteSortButtons();
      updateRemoveSelectedButton();
      load().catch((error) => msg(error.message, true));
      setInterval(renderPlaybackFrame, 250);
      setInterval(() => {
        if (document.visibilityState === 'visible') {
          load().catch((error) => msg(error.message, true));
        }
      }, 1000);
    </script>
  </body>
</html>
